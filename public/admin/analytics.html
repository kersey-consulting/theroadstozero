<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Analytics Dashboard</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
        :root {
          --bg: #f9fafb;
          --card: #ffffff;
          --border: #e5e7eb;
          --text: #111827;
          --muted: #6b7280;
          --accent: #2563eb;
        }

        body {
          font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
          background: var(--bg);
          color: var(--text);
          max-width: 900px;
          margin: 2rem auto;
          padding: 0 1rem;
        }

        h1 {
          margin-bottom: 0.5rem;
        }

        button {
          background: var(--card);
          border: 1px solid var(--border);
          padding: 0.5rem 0.75rem;
          border-radius: 6px;
          cursor: pointer;
          font-weight: 500;
        }

        button:hover {
          background: #f3f4f6;
        }

        details {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 1rem;
          margin-bottom: 1.25rem;
        }

        summary {
          cursor: pointer;
          font-size: 1.1rem;
          font-weight: 600;
          list-style: none;
        }

        summary::marker,
        summary::-webkit-details-marker {
          display: none;
        }

        summary::after {
          content: '▾';
          float: right;
          color: var(--muted);
        }

        details[open] summary::after {
          content: '▴';
        }

        .metric {
          margin: 0.5rem 0;
          font-size: 1rem;
        }

        h4 {
          margin-top: 1rem;
          margin-bottom: 0.25rem;
          color: var(--muted);
        }

        ul {
          padding-left: 1.25rem;
          margin-top: 0.25rem;
        }

        li {
          margin: 0.25rem 0;
        }

        .chart-container {
          margin-top: 1rem;
        }

        canvas {
          width: 100%;
          max-height: 220px;
        }
    </style>
</head>
<body>
<h1 id="title">Analytics</h1>
<p style="color: var(--muted); margin-top: 0;">
  Private reporting dashboard
</p>
<div style="margin-bottom: 1rem;">
    <button onclick="setWindow('7d')">Last 7 days</button>
    <button onclick="setWindow('30d')">Last 30 days</button>
</div>
<div id="metrics">Loading…</div>

<script>

    const AUTH_KEY = 'admin_auth';
    const DOMAIN = 'www.theroadstozero.com'

    function getAuthFromStorage() {
        let auth = sessionStorage.getItem(AUTH_KEY);
        if (!auth) {
            const username = prompt('Admin username');
            const password = prompt('Admin password');
            auth = btoa(username + ':' + password);
            sessionStorage.setItem(AUTH_KEY, auth);
        }
        return auth;
    }

    function setWindow(windowKey) {
        const url = new URL(globalThis.location.href);
        url.searchParams.set('window', windowKey);
        globalThis.location.href = url.toString();
    }

    async function loadAnalytics() {
        const apiUrl = new URL('/admin/api/analytics', globalThis.location.origin);
        // Forward the dashboard's time window selection to the API
        const windowKey = new URL(globalThis.location.href).searchParams.get('window');
        if (windowKey) apiUrl.searchParams.set('window', windowKey);

        const res = await fetch(apiUrl.toString(), {
            headers: {
                'Authorization': 'Basic ' + getAuthFromStorage()
            }
        });

        if (!res.ok) {
            sessionStorage.removeItem(AUTH_KEY);
            document.getElementById('metrics').textContent = 'Failed to load analytics';
            return;
        }

        const data = await res.json();

        document.getElementById('title').textContent =
          `Analytics (${data.timeWindow})`;

        document.getElementById('metrics').innerHTML = `
  <details open>
    <summary><strong>Traffic Overview</strong></summary>
    <div class="metric">Users: <strong>${data.users}</strong></div>
    <div class="metric">Sessions: <strong>${data.sessions}</strong></div>
    <div class="metric">Page Views: <strong>${data.pageViews}</strong></div>
    <div class="chart-container">
      <canvas id="pageViewsChart" height="200"></canvas>
    </div>
  </details>

  <details>
    <summary><strong>Audience</strong></summary>

    <h4>Devices</h4>
    <ul>
      ${(data.devices ?? [])
            .map(d => `<li>${d.device}: ${d.sessions}</li>`)
            .join('')}
    </ul>

    <h4>New vs Returning</h4>
    <ul>
      ${(data.newVsReturning ?? [])
            .map(n => `<li>${n.type}: ${n.sessions}</li>`)
            .join('')}
    </ul>

    <h4>Top Cities (Active Users)</h4>
    <ul>
      ${(data.cities ?? [])
            .map(c => `<li>${c.city}: ${c.users}</li>`)
            .join('')}
    </ul>
  </details>

  <details>
    <summary><strong>Content Performance</strong></summary>

    <h4>Top Pages</h4>
    <ul>
      ${(data.topPages ?? [])
            .map(p => `<li>https://${DOMAIN}${p.path} – ${p.views}</li>`)
            .join('')}
    </ul>

    <h4>Traffic Sources</h4>
    <ul>
      ${(data.sources ?? [])
            .map(s => `<li>${s.channel}: ${s.sessions}</li>`)
            .join('')}
    </ul>
  </details>
  <details>
    <summary><strong>Form Submissions</strong></summary>
    <div class="metric">Contact Requests: <strong>${data.forms?.contact ?? 0}</strong></div>
    <div class="metric">Volunteer Signups: <strong>${data.forms?.volunteer ?? 0}</strong></div>
  </details>
`;
        renderPageViewsChart(data.pageViewsByDay);
    }

    loadAnalytics();

    function renderPageViewsChart(data) {
      if (!data || data.length === 0) return;

      const canvas = document.getElementById('pageViewsChart');
      if (!canvas) return;

      const ctx = canvas.getContext('2d');

      // Handle high-DPI screens (Retina)
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;

      ctx.scale(dpr, dpr);

      const width = rect.width;
      const height = rect.height;

      ctx.clearRect(0, 0, width, height);

      const values = data.map(d => d.views);
      const max = Math.max(...values);
      const padding = 30;

      const fontSize = 12;
      ctx.font = `${fontSize}px system-ui`;
      ctx.fillStyle = '#6b7280';

      // Y-axis labels (0, mid, max)
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';

      const steps = 4;
      for (let i = 0; i <= steps; i++) {
        const value = Math.round((max / steps) * i);
        const y =
          height - padding -
          (value / max) * (height - padding * 2);

        ctx.fillText(value.toString(), padding - 6, y);

        // grid line
        ctx.strokeStyle = '#f3f4f6';
        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(width - padding, y);
        ctx.stroke();
      }

      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 2;
      ctx.beginPath();

      data.forEach((point, i) => {
        const x = padding + (i / (data.length - 1)) * (width - padding * 2);
        const y =
          height - padding -
          (point.views / max) * (height - padding * 2);

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });

      ctx.stroke();

      // X-axis date labels (5 evenly spaced)
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      const stepsX = 4; // creates 5 labels
      for (let i = 0; i <= stepsX; i++) {
        const index = Math.round((i / stepsX) * (data.length - 1));
        const point = data[index];
        if (!point) continue;

        const x = padding + (index / (data.length - 1)) * (width - padding * 2);
        const dateLabel = point.date.slice(5); // MM-DD

        ctx.fillText(dateLabel, x, height - padding + 6);
      }

      // Axes
      ctx.strokeStyle = '#e5e7eb';
      ctx.beginPath();
      ctx.moveTo(padding, padding);
      ctx.lineTo(padding, height - padding);
      ctx.lineTo(width - padding, height - padding);
      ctx.stroke();
    }
</script>
</body>
</html>
